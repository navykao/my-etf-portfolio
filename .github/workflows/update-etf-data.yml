name: 🔄 Auto Update Portfolio Data

on:
  schedule:
    # รันอัตโนมัติทุกวัน จันทร์-ศุกร์ เวลา 08:00 น. (เวลาไทย = 01:00 UTC)
    - cron: '0 1 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Update mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - force
          - csv-only

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Run update (normal mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'normal' }}
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: node scripts/update-etf-data.cjs

      - name: 🔄 Run update (force mode)
        if: ${{ github.event.inputs.mode == 'force' }}
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: node scripts/update-etf-data.cjs --force

      - name: 📥 Run update (csv-only mode)
        if: ${{ github.event.inputs.mode == 'csv-only' }}
        run: node scripts/update-etf-data.cjs --csv

      - name: 📤 Commit และ Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Auto-update: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
