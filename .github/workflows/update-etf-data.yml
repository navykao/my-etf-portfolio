name: Update ETF Data

on:
  schedule:
    # รันทุกวัน เวลา 00:00 UTC = 07:00 น. เวลาไทย
    - cron: '0 0 * * *'
  
  # รันทุกวันจันทร์-ศุกร์ ตลาดปิด 21:00 UTC = 04:00 น. ไทย (หลังตลาดปิด)
  # - cron: '0 21 * * 1-5'
  
  # สามารถกดรันมือได้จาก GitHub Actions tab
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run ETF data update script
        run: node scripts/update-etf-data.cjs
      
      - name: Check if data changed
        id: check_changes
        run: |
          git diff --quiet data/etf-database.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/etf-database.json
          git commit -m "📊 Auto-update ETF data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
