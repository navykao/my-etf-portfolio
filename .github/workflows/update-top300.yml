name: Update 300 Stocks + 250 ETF

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Update 300 Stocks + 250 ETF
        run: node scripts/update-combined-top300.cjs
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update 300 Stocks + 250 ETF [$(date +'%Y-%m-%d %H:%M')]"
            git push
          fi
