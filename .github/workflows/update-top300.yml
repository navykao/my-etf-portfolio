name: Update 300 Stocks + 250 ETF

on:
  schedule:
    - cron: '0 2 * * 1-5'  # รันเวลา 02:00 UTC ทุกวันจันทร์-ศุกร์
  workflow_dispatch:  # สามารถรันด้วยตัวเองได้

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ อัพเกรดจาก v3 เป็น v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ อัพเกรดจาก v3 เป็น v4
        with:
          node-version: '22'  # ✅ เปลี่ยนจาก 18 เป็น 22 (LTS)
      
      - name: Update 300 Stocks + 250 ETF
        run: node scripts/update-combined-top300.cjs
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FMP0N8_API_KEY: ${{ secrets.FMP0N8_API_KEY }}
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update 300 Stocks + 250 ETF data [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
