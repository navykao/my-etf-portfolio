# ==========================================
# 📈 Fetch Data using yfinance
# ==========================================
def fetch_stock_data():
    print("📥 Fetching data using yfinance...\n")
    
    results = []
    batch_size = 50
    batches = [UNIQUE_SYMBOLS[i:i + batch_size] for i in range(0, len(UNIQUE_SYMBOLS), batch_size)]
    
    print(f"📦 Processing {len(batches)} batches...\n")
    
    for i, batch in enumerate(batches):
        batch_num = i + 1
        print(f"  Processing batch {batch_num}/{len(batches)}...", end=" ", flush=True)
        
        try:
            # Download data for batch
            tickers = yf.Tickers(' '.join(batch))
            
            success_count = 0
            for symbol in batch:
                try:
                    ticker = tickers.tickers[symbol]
                    info = ticker.info
                    
                    # Get price
                    price = info.get('regularMarketPrice') or info.get('currentPrice') or info.get('previousClose', 0)
                    
                    if price and price > 0:
                        # Get name
                        name = info.get('shortName') or info.get('longName') or symbol
                        
                        # Get dividend yield (already in decimal, e.g. 0.0245 = 2.45%)
                        div_yield = info.get('dividendYield', 0) or info.get('trailingAnnualDividendYield', 0)
                        if div_yield:
                            # yfinance returns as decimal (0.0245), multiply by 100 for percentage
                            div_yield = div_yield * 100
                        
                        # Get type
                        quote_type = info.get('quoteType', 'Stock')
                        asset_type = 'ETF' if quote_type == 'ETF' else 'Stock'
                        
                        results.append({
                            'symbol': symbol,
                            'name': name,
                            'price': f"{price:.2f}",
                            'dividendYield': f"{div_yield:.2f}",
                            'type': asset_type
                        })
                        success_count += 1
                        
                except Exception as e:
                    # Silently skip failed symbols
                    pass
            
            print(f"✅ {success_count}/{len(batch)} symbols")
            
        except Exception as e:
            print(f"❌ Error: {str(e)}")
    
    print(f"\n  → Total fetched: {len(results)}/{len(UNIQUE_SYMBOLS)} symbols\n")
    return results

# ==========================================
# 💾 Save to File
# ==========================================
def save_data(data):
    # Create output directory
    script_dir = Path(__file__).parent
    output_dir = script_dir.parent / 'data'
    output_dir.mkdir(exist_ok=True)
    
    output_path = output_dir / 'combined-all-assets.json'
    
    # Add metadata
    output = {
        '_metadata': {
            'lastUpdated': datetime.now().isoformat(),
            'totalAssets': len(data),
            'dataSource': 'yfinance library',
            'updateFrequency': 'Daily at 07:00 Thailand time',
            'version': '6.1'
        },
        'data': data
    }
    
    # Write file
    with open(output_path, 'w', encoding='utf-8') as f:
        json.dump(output, f, indent=2, ensure_ascii=False)
    
    file_size = output_path.stat().st_size / 1024
    
    print("=" * 70)
    print("✅ SUCCESS!")
    print("=" * 70)
    print(f"📁 File saved: {output_path}")
    print(f"📦 File size: {file_size:.1f} KB")
    print(f"📊 Assets: {len(data)}")
    print(f"📅 Updated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
    print("=" * 70)

# ==========================================
# 🎯 Main
# ==========================================
def main():
    try:
        data = fetch_stock_data()
        
        if len(data) == 0:
            print("❌ No data fetched! Aborting...")
            exit(1)
        
        save_data(data)
        
        print("\n✅ Update completed successfully!")
        exit(0)
        
    except Exception as error:
        print(f"\n❌ Fatal error: {error}")
        exit(1)

if __name__ == '__main__':
    main()
