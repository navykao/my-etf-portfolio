name: Update Combined 746 Assets (S&P 500 + Top 250 ETF)

on:
  schedule:
    # รันทุกวันจันทร์-ศุกร์ เวลา 23:00 UTC (06:00 เช้าเวลาไทย)
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # รันด้วยตัวเองได้

jobs:
  update-combined:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # ตั้งเวลาสูงสุด 120 นาที (496*8 + 250*8 = 101 นาที)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Update 746 Combined Assets
        run: |
          cd scripts
          node update-combined-746-assets.cjs
        env:
          TZ: 'Asia/Bangkok'
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FMP0N8_API_KEY: ${{ secrets.FMP0N8_API_KEY }}
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/combined-746-assets.json data/combined-746-assets.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update Combined 746 Assets: S&P 500 + ETF [$(date '+%Y-%m-%d %H:%M:%S')]" && git push)
