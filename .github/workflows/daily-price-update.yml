# .github/workflows/daily-price-update.yml
#
# ระบบหลัก:  cron-job.org → workflow_dispatch เวลา 04:10 ICT
# ระบบสำรอง: GitHub Actions cron → 05:30 ICT (22:30 UTC วันก่อน)
#
# ถ้าระบบหลักรันสำเร็จแล้ว ระบบสำรองจะเจอ "No data changes" → skip commit

name: Daily Price Update

permissions:
  contents: write

concurrency:
  group: daily-price-update
  cancel-in-progress: true

on:
  schedule:
  # ระบบสำรอง: 22:15 ICT = 15:15 UTC
  - cron: '15 15 * * *'

  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run update-all-assets
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP0N8_API_KEY: ${{ secrets.FMP0N8_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/update-all-assets.cjs

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/stocks.json public/data/etfs.json || true

          git commit -m "📈 Auto-update: prices + ETF profiles [$(date '+%Y-%m-%d %H:%M ICT')]"

          git pull --rebase origin main

          git push

      - name: No changes detected
        if: steps.check_changes.outputs.changed != 'true'
        run: echo "✅ No data changes - skip commit"
