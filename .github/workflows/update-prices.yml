# ============================================
# GitHub Actions: Daily Price Update (2x/day)
# ============================================

name: 📊 Daily Price Update (2x/day)

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 5:00 AM ไทย
    - cron: '30 15 * * 1-5'  # 10:30 PM ไทย
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # ✅ เพิ่มจาก 30 → 45 นาที

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📊 Update all asset prices
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          echo "🚀 Starting price update..."
          node scripts/update-all-assets.cjs

      - name: 🔍 Check for changes
        id: check_changes
        run: |
          # ✅ ตรวจสอบทั้ง stocks.json และ etfs.json
          if git diff --quiet public/data/stocks.json public/data/etfs.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ✅ commit ทั้ง 2 ไฟล์
          git add public/data/stocks.json public/data/etfs.json
          git commit -m "📊 Daily price update: $(date -u '+%Y-%m-%d')"
          git push
