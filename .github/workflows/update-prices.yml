# .github/workflows/update-prices.yml
# ════════════════════════════════════════════════
# Daily Price Update + ETF Profile (รวมในไฟล์เดียว)
#
# Phase 1: Finnhub /quote       → ราคาทุก asset
# Phase 2: Finnhub /metric      → Fundamental
# Phase 3: Alpha Vantage        → ETF Profile (7-day)
# Phase 4: FMP                  → fallback ราคา
# Phase 5: EODHD + Twelve Data  → fallback สุดท้าย
#
# Schedule: ทุกวัน (จันทร์-อาทิตย์) วันละ 2 ครั้ง
#   - 08:00 ICT (01:00 UTC)
#   - 16:00 ICT (09:00 UTC)
# ════════════════════════════════════════════════

name: Daily Price Update

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 ICT (01:00 UTC) - ทุกวัน
    - cron: '0 9 * * *'   # 16:00 ICT (09:00 UTC) - ทุกวัน
  workflow_dispatch:          # รันมือได้จาก GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # Phase 1+2 ใช้เวลา ~60-80 นาที

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}   # ใช้ PAT เพื่อ push ได้

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✅ FIX: ติดตั้ง dependencies ก่อนรัน script
      - name: Install dependencies
        run: npm install

      - name: Run update-all-assets
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP0N8_API_KEY:       ${{ secrets.FMP0N8_API_KEY }}
          EODHD_API_KEY:        ${{ secrets.EODHD_API_KEY }}
          TWELVE_DATA_API_KEY:  ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/update-all-assets.cjs

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ✅ FIX: เพิ่ม || true เพื่อไม่ให้ error ถ้าไม่มีไฟล์ใดไฟล์หนึ่ง
          git add public/data/stocks.json public/data/etfs.json || true
          git commit -m "📊 Auto-update: prices + ETF profiles [$(date '+%Y-%m-%d %H:%M ICT')]"
          git push

      - name: No changes detected
        if: steps.check_changes.outputs.changed != 'true'
        run: echo "✅ No data changes — skip commit"
