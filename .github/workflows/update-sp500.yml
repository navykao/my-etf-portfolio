name: Update S&P 500 Database

on:
  schedule:
    # รันทุกวันจันทร์-ศุกร์ เวลา 01:00 UTC (08:00 เช้าเวลาไทย)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # รันด้วยตัวเองได้

jobs:
  update-sp500:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Update S&P 500 data
        run: |
          cd scripts
          node update-sp500-data.cjs
        env:
          TZ: 'Asia/Bangkok'
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/sp500-database.json data/sp500-database.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update S&P 500 data [$(date '+%Y-%m-%d %H:%M:%S')]" && git push)
