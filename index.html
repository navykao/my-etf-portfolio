<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETF Portfolio Tracker v6.3 - Firebase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration จากไฟล์ firebes.txt ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyCItvIP2yRlxjblvaWn9sqw-ykv-dmk84A",
            authDomain: "my-etf-portfolio-v2.firebaseapp.com",
            projectId: "my-etf-portfolio-v2",
            storageBucket: "my-etf-portfolio-v2.firebasestorage.app",
            messagingSenderId: "420167991494",
            appId: "1:420167991494:web:0129fd79f25c81f412d7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userDoc = doc(db, "users", "weeradet_p"); // ใช้ ID ประจำตัวคุณ

        // เชื่อมต่อตัวแปรเข้ากับ Window เพื่อให้ฟังก์ชันอื่นเรียกใช้ได้
        window.saveData = async (portfolio, watchlist) => {
            await setDoc(userDoc, { portfolio, watchlist, lastUpdated: new Date() });
            console.log("💾 บันทึกข้อมูลไปที่ Firestore แล้ว");
        };

        // ระบบโหลดข้อมูลแบบ Real-time (F5 แล้วข้อมูลไม่หาย)
        onSnapshot(userDoc, (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                window.portfolio = data.portfolio || [];
                window.watchlist = data.watchlist || [];
                window.renderAll();
            }
        });
    </script>

    <script>
        window.portfolio = [];
        window.watchlist = [];
        window.prices = {};

        // ดึงราคาล่าสุดจาก GitHub Data
        async function loadPrices() {
            try {
                const res = await fetch('public/data/combined-all-assets.json');
                const data = await res.json();
                data.forEach(item => window.prices[item.symbol] = item.price);
                window.renderAll();
            } catch (e) { console.error("ราคาโหลดไม่สำเร็จ:", e); }
        }

        // ฟังก์ชันเพิ่มหุ้นเข้าพอร์ต
        window.addAsset = function() {
            const symbol = document.getElementById('symbol').value.toUpperCase();
            const amount = parseFloat(document.getElementById('amount').value);
            const avg = parseFloat(document.getElementById('avg').value);

            if (symbol && amount) {
                window.portfolio.push({ symbol, amount, avgPrice: avg });
                window.saveData(window.portfolio, window.watchlist); // บันทึกทันที
                document.getElementById('symbol').value = '';
                document.getElementById('amount').value = '';
            }
        };

        // ฟังก์ชันลบหุ้น
        window.removeAsset = function(index) {
            window.portfolio.splice(index, 1);
            window.saveData(window.portfolio, window.watchlist);
        };

        // ฟังก์ชันวาด UI
        window.renderAll = function() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = window.portfolio.map((item, index) => {
                const currentPrice = window.prices[item.symbol] || 0;
                const marketValue = (item.amount * currentPrice).toLocaleString();
                return `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded mb-2 border-l-4 border-blue-500">
                        <div>
                            <span class="font-bold text-blue-400">${item.symbol}</span>
                            <div class="text-xs text-slate-400">${item.amount} Shares @ $${currentPrice}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold">$${marketValue}</div>
                            <button onclick="window.removeAsset(${index})" class="text-red-500 text-xs">ลบออก</button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.onload = loadPrices;
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-blue-500">Portfolio Tracker v6.3</h1>
            <p class="text-xs text-slate-400">สถานะ: <span class="text-green-500">● เชื่อมต่อ Firebase Firestore แล้ว</span></p>
        </header>

        <div class="bg-slate-800 p-4 rounded-xl mb-6 shadow-xl">
            <h2 class="text-sm font-semibold mb-3 border-b border-slate-700 pb-2">เพิ่มสินทรัพย์ใหม่</h2>
            <div class="grid grid-cols-3 gap-2 mb-3">
                <input id="symbol" placeholder="Symbol (เช่น QQQI)" class="bg-slate-700 p-2 rounded text-xs outline-none focus:ring-1 ring-blue-500" />
                <input id="amount" type="number" placeholder="จำนวนหุ้น" class="bg-slate-700 p-2 rounded text-xs outline-none" />
                <input id="avg" type="number" placeholder="ราคาเฉลี่ย" class="bg-slate-700 p-2 rounded text-xs outline-none" />
            </div>
            <button onclick="window.addAsset()" class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded text-sm font-bold transition">เพิ่มเข้าพอร์ต</button>
        </div>

        <div>
            <h2 class="text-sm font-semibold mb-4">รายการสินทรัพย์ของคุณ</h2>
            <div id="portfolio-list">
                <p class="text-center text-slate-500 py-10 text-xs">กำลังโหลดข้อมูลจาก Firestore...</p>
            </div>
        </div>
    </div>
</body>
</html>
