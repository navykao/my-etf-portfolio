<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETF Portfolio Tracker v6.3 - Original UI + Firebase</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // Firebase Config จากไฟล์ของคุณ
      const firebaseConfig = {
        apiKey: "AIzaSyCItvIP2yRlxjblvaWn9sqw-ykv-dmk84A",
        authDomain: "my-etf-portfolio-v2.firebaseapp.com",
        projectId: "my-etf-portfolio-v2",
        storageBucket: "my-etf-portfolio-v2.firebasestorage.app",
        messagingSenderId: "420167991494",
        appId: "1:420167991494:web:0129fd79f25c81f412d7c7"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const userDoc = doc(db, "users", "weeradet_p");

      // ฟังก์ชันบันทึกข้อมูล (ส่งออกไปที่ window เพื่อให้ปุ่มกดเรียกใช้ได้)
      window.syncToFirebase = async () => {
        await setDoc(userDoc, { 
          portfolio: window.portfolio, 
          watchlist: window.watchlist,
          lastUpdated: new Date().toISOString()
        });
        console.log("💾 Synced to Firebase");
      };

      // ระบบโหลดข้อมูลอัตโนมัติ (F5 แล้วข้อมูลกลับมา)
      onSnapshot(userDoc, (doc) => {
        if (doc.exists()) {
          const data = doc.data();
          window.portfolio = data.portfolio || [];
          window.watchlist = data.watchlist || [];
          window.renderAll(); // สั่งวาดหน้าจอใหม่เมื่อข้อมูลมาถึง
        }
      });
    </script>

    <script>
      // ตัวแปรหลัก
      window.portfolio = [];
      window.watchlist = [];
      window.assetPrices = {};

      // ดึงราคาล่าสุด
      async function fetchPrices() {
        try {
          const response = await fetch('public/data/combined-all-assets.json');
          const data = await response.json();
          data.forEach(asset => { window.assetPrices[asset.symbol] = asset; });
          window.renderAll();
        } catch (e) { console.error("Price load error"); }
      }

      // ฟังก์ชันเพิ่มหุ้น (พอร์ต)
      window.addAsset = function() {
        const symbol = document.getElementById('input-symbol').value.toUpperCase();
        const amount = parseFloat(document.getElementById('input-amount').value);
        const avgPrice = parseFloat(document.getElementById('input-avg').value);
        
        if (symbol && amount) {
          window.portfolio.push({ symbol, amount, avgPrice });
          window.syncToFirebase(); // บันทึกทันที
          document.getElementById('input-symbol').value = '';
        }
      };

      // ฟังก์ชันจัดการ Watchlist (เพิ่ม/ลบ)
      window.toggleWatchlist = function() {
        const symbol = document.getElementById('search-stock').value.toUpperCase();
        if (symbol) {
          const index = window.watchlist.indexOf(symbol);
          if (index > -1) { window.watchlist.splice(index, 1); } 
          else { window.watchlist.push(symbol); }
          window.syncToFirebase();
          document.getElementById('search-stock').value = '';
        }
      };

      // ฟังก์ชันวาดหน้าจอ (คงรูปแบบเดิมของคุณไว้)
      window.renderAll = function() {
        // ส่วนแสดงพอร์ต
        const pContainer = document.getElementById('portfolio-container');
        if (pContainer) {
          pContainer.innerHTML = window.portfolio.map((item, index) => {
            const priceData = window.assetPrices[item.symbol] || { price: 0 };
            return `
              <div class="flex justify-between p-3 bg-slate-800 rounded mb-2 border-l-4 border-blue-500">
                <span>${item.symbol} (${item.amount} หุ้น)</span>
                <span>$${(item.amount * priceData.price).toLocaleString()} 
                  <button onclick="window.portfolio.splice(${index},1); window.syncToFirebase();" class="ml-2 text-red-500">✕</button>
                </span>
              </div>`;
          }).join('');
        }

        // ส่วนแสดง Watchlist
        const wContainer = document.getElementById('watchlist-container');
        if (wContainer) {
          wContainer.innerHTML = window.watchlist.map(sym => `
            <div class="p-2 border-b border-slate-700 flex justify-between">
              <span>${sym}</span>
              <span>$${window.assetPrices[sym]?.price || '---'}</span>
            </div>`).join('');
        }
      };

      window.onload = fetchPrices;
    </script>

    <style>
      body { background-color: #0f172a; color: white; }
    </style>
  </head>
  <body class="p-5">
    <div id="root" class="max-w-4xl mx-auto">
      <h1 class="text-2xl font-bold mb-2">ETF Portfolio Tracker v6.3</h1>
      <p class="text-xs text-slate-400 mb-6">สถานะ: <span class="text-green-500">● เชื่อมต่อ Firebase สำเร็จ</span></p>

      <div class="bg-slate-800 p-4 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-4 gap-3">
        <input id="input-symbol" placeholder="Symbol" class="bg-slate-700 p-2 rounded outline-none" />
        <input id="input-amount" type="number" placeholder="จำนวน" class="bg-slate-700 p-2 rounded outline-none" />
        <input id="input-avg" type="number" placeholder="ราคาเฉลี่ย" class="bg-slate-700 p-2 rounded outline-none" />
        <button onclick="window.addAsset()" class="bg-blue-600 rounded font-bold">เพิ่มเข้าพอร์ต</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h2 class="font-bold mb-3">My Portfolio</h2>
          <div id="portfolio-container"></div>
        </div>

        <div>
          <h2 class="font-bold mb-3">Watchlist & Search</h2>
          <div class="flex gap-2 mb-4">
            <input id="search-stock" placeholder="ค้นหาหุ้น/ETF..." class="flex-1 bg-slate-800 p-2 rounded outline-none" />
            <button onclick="window.toggleWatchlist()" class="bg-slate-700 px-4 rounded">★</button>
          </div>
          <div id="watchlist-container" class="bg-slate-800/50 rounded-xl p-3"></div>
        </div>
      </div>
    </div>
  </body>
</html>
